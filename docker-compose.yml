services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: sentinel
      POSTGRES_USER: sentinel
      POSTGRES_PASSWORD: sentinel_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinel"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ingest:
    build:
      context: ./ingest
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "514:514/udp"
      - "6514:6514"
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - services

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - services

  storage-worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
    env_file: .env
    command: python -m workers.storage_worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - workers

  archive-worker:
    build:
      context: .
      dockerfile: workers/Dockerfile
    env_file: .env
    command: python -m workers.archive_worker
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - workers

volumes:
  postgres_data:
  redis_data:
