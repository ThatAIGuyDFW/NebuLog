name: Build Installers

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Windows .exe ─────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r api/requirements.txt
          pip install -r ingest/requirements.txt
          pip install -r workers/requirements.txt
          pip install -r correlation/requirements.txt
          pip install -r installer/requirements.txt

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Install PostgreSQL 16 and copy binaries
        shell: pwsh
        run: |
          choco install postgresql16 --no-progress -y --params '/Password:sentinel_build_ci'
          $pgSrc = "C:\Program Files\PostgreSQL\16"
          New-Item -ItemType Directory -Force installer\embedded\postgresql | Out-Null
          Copy-Item "$pgSrc\bin"   installer\embedded\postgresql\bin   -Recurse -Force
          Copy-Item "$pgSrc\lib"   installer\embedded\postgresql\lib   -Recurse -Force
          Copy-Item "$pgSrc\share" installer\embedded\postgresql\share -Recurse -Force
          Write-Host "PostgreSQL binaries staged."

      - name: Download Redis for Windows
        shell: pwsh
        run: |
          $ver = "5.0.14.1"
          $url = "https://github.com/tporadowski/redis/releases/download/v$ver/Redis-x64-$ver.zip"
          Invoke-WebRequest $url -OutFile redis.zip -UseBasicParsing
          Expand-Archive redis.zip -DestinationPath redis_tmp -Force
          New-Item -ItemType Directory -Force installer\embedded\redis | Out-Null
          Copy-Item redis_tmp\redis-server.exe installer\embedded\redis\ -Force
          Remove-Item redis.zip, redis_tmp -Recurse -Force
          Write-Host "Redis binary staged."

      - name: Generate icons
        shell: pwsh
        run: python installer/generate_icons.py

      - name: Build React UI
        shell: pwsh
        run: |
          cd ui
          npm ci
          npm run build

      - name: Run PyInstaller
        shell: pwsh
        run: python -m PyInstaller --clean installer/sentinel.spec

      - name: Build Windows installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "iscc" }
          & $iscc installer\windows\sentinel.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SentinelSetup-windows
          path: dist/SentinelSetup.exe
          retention-days: 30

  # ── macOS .pkg ───────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r api/requirements.txt
          pip install -r ingest/requirements.txt
          pip install -r workers/requirements.txt
          pip install -r correlation/requirements.txt
          pip install -r installer/requirements.txt

      - name: Install PostgreSQL 16 and Redis via Homebrew
        run: |
          export HOMEBREW_NO_AUTO_UPDATE=1
          brew install postgresql@16 redis
          PG_PREFIX=$(brew --prefix postgresql@16)
          mkdir -p installer/embedded/postgresql/bin
          mkdir -p installer/embedded/postgresql/lib
          mkdir -p installer/embedded/postgresql/share
          cp -r "$PG_PREFIX/bin/."   installer/embedded/postgresql/bin/
          cp -r "$PG_PREFIX/lib/."   installer/embedded/postgresql/lib/
          cp -r "$PG_PREFIX/share/." installer/embedded/postgresql/share/ 2>/dev/null || true
          REDIS_PREFIX=$(brew --prefix redis)
          mkdir -p installer/embedded/redis
          cp "$REDIS_PREFIX/bin/redis-server" installer/embedded/redis/
          echo "Dependencies staged."

      - name: Generate icons
        run: python installer/generate_icons.py

      - name: Build React UI
        run: |
          cd ui
          npm ci
          npm run build

      - name: Run PyInstaller
        run: python -m PyInstaller --clean installer/sentinel.spec

      - name: Build macOS .pkg
        run: bash installer/macos/build-pkg.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SentinelSetup-macos
          path: dist/SentinelSetup.pkg
          retention-days: 30

  # ── Linux .deb + .rpm ────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install system build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ruby ruby-dev rubygems build-essential rpm
          sudo gem install fpm --no-document

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r api/requirements.txt
          pip install -r ingest/requirements.txt
          pip install -r workers/requirements.txt
          pip install -r correlation/requirements.txt
          pip install -r installer/requirements.txt

      - name: Create assets directory
        run: mkdir -p installer/assets

      - name: Build React UI
        run: |
          cd ui
          npm ci
          npm run build

      - name: Run PyInstaller
        run: python -m PyInstaller --clean installer/sentinel.spec

      - name: Build Linux packages
        run: bash installer/linux/build-packages.sh

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-linux-deb
          path: dist/sentinel_*.deb
          retention-days: 30

      - name: Upload .rpm
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-linux-rpm
          path: dist/sentinel-*.rpm
          retention-days: 30

  # ── GitHub Release ────────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Sentinel SIEM ${{ github.ref_name }}"
          body: |
            ## Sentinel SIEM ${{ github.ref_name }}

            ### Downloads

            | Platform | File | Notes |
            |---|---|---|
            | Windows 10/11 (64-bit) | `SentinelSetup.exe` | Includes embedded PostgreSQL 16 + Redis |
            | macOS 12+ | `SentinelSetup.pkg` | Includes embedded PostgreSQL 16 + Redis |
            | Ubuntu / Debian | `sentinel_*_amd64.deb` | Requires postgresql-16 + redis packages |
            | RHEL / CentOS 8+ | `sentinel-*.x86_64.rpm` | Requires postgresql + redis packages |

            ### First-time setup
            After installing, run the setup wizard (launches automatically on Windows/macOS)
            or run `sentinel --setup` on Linux to configure your database password and
            optional Azure AD credentials.

            See the [README](https://github.com/ThatAIGuyDFW/NebuLog#readme) for full instructions.
          files: |
            dist/SentinelSetup-windows/SentinelSetup.exe
            dist/SentinelSetup-macos/SentinelSetup.pkg
            dist/sentinel-linux-deb/sentinel_*.deb
            dist/sentinel-linux-rpm/sentinel-*.rpm
          draft: false
          prerelease: false
