[alembic]
script_location = .
prepend_sys_path = .
# NOTE: version_locations is intentionally not set. Alembic splits that option
# on spaces by default, which breaks absolute paths containing spaces (e.g.
# "C:\Program Files\Sentinel SIEM\..."). With it unset, Alembic uses
# <script_location>/versions via a plain path join, which is space-safe.

# Use DATABASE_URL env var at runtime (see env.py)
sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
