name: Build Installers

on:
  push:
    tags:
      - "v*.*.*"          # trigger on version tags: v1.0.0, v1.2.3, etc.
  workflow_dispatch:       # allow manual runs from the Actions tab

permissions:
  contents: write          # needed to create GitHub Releases

jobs:
  # ── Windows .exe ─────────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r api/requirements.txt
          pip install -r ingest/requirements.txt
          pip install -r workers/requirements.txt
          pip install -r correlation/requirements.txt
          pip install -r installer/requirements.txt
          pip install pywin32
          python Scripts/pywin32_postinstall.py -install

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build (UI + deps + PyInstaller + Inno Setup)
        shell: pwsh
        run: python installer/build.py --platform windows

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: SentinelSetup-windows
          path: dist/SentinelSetup.exe
          retention-days: 30

  # ── macOS .pkg ───────────────────────────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r api/requirements.txt
          pip install -r ingest/requirements.txt
          pip install -r workers/requirements.txt
          pip install -r correlation/requirements.txt
          pip install -r installer/requirements.txt

      - name: Install build tools
        run: |
          brew install upx 2>/dev/null || true   # optional compression

      - name: Build (UI + deps + PyInstaller + .pkg)
        run: python installer/build.py --platform macos

      - name: Sign & notarize (optional)
        if: env.INSTALLER_SIGN_IDENTITY != ''
        env:
          INSTALLER_SIGN_IDENTITY: ${{ secrets.MACOS_INSTALLER_SIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          xcrun notarytool submit dist/SentinelSetup.pkg \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait
          xcrun stapler staple dist/SentinelSetup.pkg

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: SentinelSetup-macos
          path: dist/SentinelSetup.pkg
          retention-days: 30

  # ── Linux .deb + .rpm ────────────────────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ruby ruby-dev rubygems build-essential rpm \
            upx-ucl patchelf
          sudo gem install fpm --no-document

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r api/requirements.txt
          pip install -r ingest/requirements.txt
          pip install -r workers/requirements.txt
          pip install -r correlation/requirements.txt
          pip install -r installer/requirements.txt

      - name: Build (UI + PyInstaller + .deb + .rpm)
        run: python installer/build.py --platform linux

      - name: Upload Linux .deb
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-linux-deb
          path: dist/sentinel_*.deb
          retention-days: 30

      - name: Upload Linux .rpm
        uses: actions/upload-artifact@v4
        with:
          name: sentinel-linux-rpm
          path: dist/sentinel-*.rpm
          retention-days: 30

  # ── GitHub Release ────────────────────────────────────────────────────────────
  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Sentinel SIEM ${{ github.ref_name }}"
          body: |
            ## Sentinel SIEM ${{ github.ref_name }}

            ### Downloads

            | Platform | File | Description |
            |---|---|---|
            | Windows 10/11 | `SentinelSetup.exe` | Self-contained installer |
            | macOS 12+ | `SentinelSetup.pkg` | macOS package installer |
            | Ubuntu/Debian | `sentinel_*_amd64.deb` | Debian package |
            | RHEL/CentOS | `sentinel-*.x86_64.rpm` | RPM package |

            ### What's included
            - Embedded PostgreSQL 16 (Windows and macOS)
            - Embedded Redis 7
            - Pre-built React dashboard
            - All Sentinel services (ingest, API, workers, correlation engine)
            - First-time setup wizard
            - System tray management (Windows/macOS)
            - systemd service (Linux)

            ### Requirements
            - **Windows**: Windows 10 or later, 64-bit
            - **macOS**: macOS Monterey (12.0) or later
            - **Linux**: Ubuntu 22.04+, Debian 11+, RHEL/CentOS 8+, systemd

            ### First-time setup
            After installing, run the setup wizard to configure your database password and
            optional Azure AD credentials. See the [README](https://github.com/ThatAIGuyDFW/NebuLog#readme)
            for full instructions.
          files: |
            dist/SentinelSetup-windows/SentinelSetup.exe
            dist/SentinelSetup-macos/SentinelSetup.pkg
            dist/sentinel-linux-deb/sentinel_*.deb
            dist/sentinel-linux-rpm/sentinel-*.rpm
          draft: false
          prerelease: false
